# ===========================
# PRODUCTION profile
# Used when deployed to Azure or any cloud environment
# Set via: -Dspring.profiles.active=prod
# or environment variable: SPRING_PROFILES_ACTIVE=prod
# ===========================

# Data directory on the server - override via environment variable
# Set APP_DATA_DIRECTORY in your Azure App Service configuration
app.data.directory=${APP_DATA_DIRECTORY:/data/mydata}

# CORS - restrict to your actual frontend domain in production
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000}

# Hide error details from clients in production
server.error.include-message=never
server.error.include-stacktrace=never

# Less verbose logging in production
logging.level.root=WARN
logging.level.com.myservice=INFO
